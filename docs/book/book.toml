[book]
title = "ChakraDB — The Definitive Guide"
authors = ["The ChakraDB Authors"]
description = "The embedded HTAP database with built-in graph capabilities: architecture, algorithms, tutorials, case studies, and comparisons."
language = "en"
src = "src"

[output.html]
default-theme = "rust"
preferred-dark-theme = "ayu"
git-repository-url = "https://github.com/ajsinha/chakradb"
additional-js = ["mermaid.min.js", "mermaid-init.js"]

[output.html.fold]
enable = true
level = 1

# Diagrams are written as ```mermaid fenced blocks. To render them in the built
# HTML, install the preprocessor once:  cargo install mdbook-mermaid  &&
# mdbook-mermaid install docs/book   (adds mermaid.min.js + the preprocessor).
[preprocessor.mermaid]
command = "mdbook-mermaid"

[build]
build-dir = "book"
